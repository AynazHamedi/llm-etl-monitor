
project:
  name: "llm-etl-monitor"
  version: "0.1.0"

# --- Local LLM settings  ---
llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model_name: "mistral:latest"
  temperature: 0.0
  max_tokens: 512
  timeout_seconds: 30

# --- MLflow settings ---
mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "llm-etl-monitoring"

# --- Decision engine thresholds  ---
decision_engine:
  simple_error_types: ["missing_value", "duplicate", "type_mismatch", "format_error"]
  semantic_error_types: ["semantic_inconsistency", "schema_mismatch_semantic", "unstructured_text"]
  max_rows_per_llm_batch: 100
  high_cardinality_ratio: 0.5
  high_missing_ratio: 0.5

# --- Agent Reviewer thresholds  ---
agents:
  score_confidence_threshold: 70
  llm_timeout_seconds: 30

# --- Evaluation thresholds  ---
evaluation_thresholds:
  completeness_min_percent: 95
  consistency_min_percent: 90
  duplicate_rate_max_percent: 1
  llm_latency_max_seconds_per_row: 5
  correction_error_rate_min_percent: 80
  log_coverage_percent: 100
  drift_detection_delay_max_batches: 1

# --- Datasets ---
datasets:
  titanic:
    path: "data/raw/titanic.csv"
    expected_main_errors: ["missing_value", "type_mismatch"]
    validation:
      required_columns: ["PassengerId", "Pclass", "Sex", "Age", "Embarked"]
      unique_columns: ["PassengerId"]
  adult_income:
    path: "data/raw/adult_income.csv"
    expected_main_errors: ["inconsistency", "noise", "duplicate"]
    na_tokens: ["?"]          # Adult encodes missing values as "?"
    validation:
      required_columns: ["age", "workclass", "occupation"]
  openml_dirty:
    path: "data/raw/openml_dirty.csv"
    expected_main_errors: ["schema_mismatch", "semantic_error"]
    validation:
      required_columns: ["employee_id", "age", "department"]
      unique_columns: ["employee_id"]
  synthetic_llmclean:
    path: "data/raw/synthetic_llmclean.csv"
    expected_main_errors: ["semantic_error", "mixed_format"]
    validation:
      required_columns: ["customer_name", "product_category", "quantity"]
